#:schema https://raw.githubusercontent.com/YunoHost/apps/main/schemas/manifest.v2.schema.json

packaging_format = 2

id = "storymapjs"
name = "StoryMapJS"
description.en = "Create interactive story maps with multimedia content."
description.fr = "Créer des story maps interactives avec du contenu multimédia."

version = "0.9.5~ynh1"

maintainers = ["otm33GH"]

[upstream]
license = "MPL-2.0"
website = "https://storymap.knightlab.com"
demo = "https://storymap.knightlab.com"
code = "https://github.com/NUKnightLab/StoryMapJS"

[integration]
yunohost = ">= 12.1.17"
helpers_version = "2.1"
# FIXME: can be replaced by a list of supported archs using the dpkg --print-architecture nomenclature (amd64/i386/armhf/arm64), for example: ["amd64", "i386"]
architectures = "all"
multi_instance = false
ldap = false
sso = true

# FIXME: replace with an **estimate** minimum disk and RAM requirements. e.g. 20M, 400M, 1G...
disk = "50M"
ram.build = "50M"
ram.runtime = "50M"

[install]
    [install.domain]
    # this is a generic question - ask strings are automatically handled by YunoHost's core
    type = "domain"
    
    [install.init_main_permission]
    type = "group"
    default = "all_users"
    
    [install.auth_mode]
    ask.en = "Authentication mode"
    ask.fr = "Mode d'authentification"
    type = "select"
    choices = ["ssowat", "google"]
    default = "ssowat"

    [install.google_client_id]
    ask.en = "Google OAuth Client ID"
    ask.fr = "Google OAuth Client ID"
    type = "string"
    optional = true
    default = ""

    [install.google_client_secret]
    ask.en = "Google OAuth Client Secret"
    ask.fr = "Google OAuth Client Secret"
    type = "password"
    optional = true
    default = ""

    [install.S3_access_key]
    ask.en = "S3 Access key"
    ask.fr = "S3 Access key"
    type = "string"

    [install.S3_secret_key]
    ask.en = "S3 Secret key"
    ask.fr = "S3 Secret key"
    type = "password"

    [install.S3_bucket_name]
    ask.en = "S3 Bucket name"
    ask.fr = "S3 Bucket name"
    type = "string"

    [install.S3_endpoint]
    ask.en = "S3 endpoint url"
    ask.fr = "S3 endpoint url"
    type = "string"


[resources]
    # See the packaging documentation for the full set
    # of explanation regarding the behavior and properties for each of those

    [resources.sources]

    [resources.sources.main]
    # This will pre-fetch the asset which can then be deployed during the install/upgrade scripts with :
    #    ynh_setup_source --dest_dir="$install_dir"
    # You can also define other assets than "main" and add --source_id="foobar" in the previous command
    url = "https://github.com/NUKnightLab/StoryMapJS/archive/refs/tags/0.9.5.tar.gz"
    sha256 = "af67d4864ff16484a9685f2afabc6c30e49e1a924fc733a3c93eb06ad510d01c"

    autoupdate.strategy = "latest_github_tag"

    [resources.system_user]
    # This will provision/deprovision a unix system user

    [resources.install_dir]
    # This will create/remove the install dir as /var/www/$app
    # and store the corresponding setting $install_dir

    [resources.data_dir]
    # This will create/remove the data dir as /home/yunohost.app/$app
    # and store the corresponding setting $data_dir

    [resources.permissions]
    # This will configure SSOwat permission for $domain/$path/
    # The initial allowed group of user is configured via the init_main_permission question (public=visitors, private=all_users)
    main.url = "/"

    [resources.ports]
    main.default = 5000
    
    [resources.apt]
    # This will automatically install/uninstall the following apt packages
    # and implicitly define the $phpversion setting as 8.0 (if phpX.Y-foobar dependencies are listed)
    packages = [
        "python3",
        "python3-pip",
        "python3-venv",
        "postgresql",
        "nodejs",
        "npm",
        "libpq-dev",
        "build-essential",
    ]
    [resources.database]
    # This will automatically provision/deprovison a MySQL DB and store the corresponding credentials in settings $db_user, $db_name, $db_pwd
    type = "postgresql"
