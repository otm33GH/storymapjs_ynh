#sub_path_only rewrite ^__PATH__$ __PATH__/ permanent;
location __PATH__/ {
    proxy_pass http://127.0.0.1:__PORT__;
  # Path to source
#  alias __INSTALL_DIR__/;
  include proxy_params_with_auth;
}
location __PATH__/static/ {
    alias __INSTALL_DIR__/static/;
}

location __PATH__/dist/ {
    alias __INSTALL_DIR__/dist/;
}

location __PATH__/compiled/ {
    alias __INSTALL_DIR__/compiled/;
}

